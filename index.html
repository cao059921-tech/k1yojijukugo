<!DOCTYPE html>
<html lang="ja">
<head>
<div id="version">ver 1.1</div>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>k1四字熟語</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin: 0 auto;
  padding: 20px;
  max-wedth: 700px;
  touch-action: manipulation;
  overflow-y: auto;
}

/* -------------------
   ユニット一覧画面
------------------- */

#version {
  position: fixed;
  bottom: 5px;
  right: 10px;
  font-size: 12px;
  color: #999;
}

#menu h2 {
  margin-bottom: 20px;
}

#unitList {
  max-width: 500px;
  margin: 0 auto;
}

.unitButton {
  width: 90%;
  margin: 10px auto;
  padding: 15px;
  border-radius: 0;

  display: flex;
  justify-content: space-between;
  align-items: center;

  border: none;

  background: #f5f5f5;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);

  font-size: 18px;
}

/* -------------------
   問題画面
------------------- */

#game {
  display: none;
}

#title {
  font-size: 20px;
  margin-top: 10px;
}

#question {
  height: 100px;
  display: flex;
  frex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 48px;      
  margin: 10px 0;
  white-space: pre-line;
  text-align: center;

  font-weight: bold;    
}

#question ruby {
  font-size: 48px;
  font-weight: bold;
  display: inline-block;
  text-align: center;
  line-height: 1.1;
}

#question rt {
  font-size: 16px;
  color: #666;
  text-align: center;
  display: block;
}

#choices {
  display: block;
  padding: 10px 15px;
  margin: 20px auto;
  margin-top: 10px;
  width: fit-content;

  background: #f2f2f2;
  border-radius: 10px;

  font-size: 20px;
}

button {
  margin: 10px 5px;
  font-size: 30px;
  touch-action: manipulation;
}

#answer {
  font-size: 28px;
  margin-top: 20px;
}

#canvas {
  display: block;
  margin: 20px auto;
  border: 1px solid black;
  touch-action: none;
  margin-top: 20px;
  width: 90%;
  height: 300px;
}

/* =====================
   下固定タブバー
===================== */

#tabBar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;

  display: flex;
  background: white;
  border-top: 1px solid #ccc;
  z-index: 999;
}

#tabBar button {
  flex: 1;
  padding: 18px;
  font-size: 18px;
  border: none;
  background: white;
}

.activeTab {
  font-weight: bold;
  background: #eee;
}

/* 下バーに隠れないように */
body {
  padding-bottom: 100px;
}

#canvasArea {
  position: relative;
  width: fit-content;
  margin: 0 auto;
}

#canvasArea button {
  position: absolute;
  border-radius: 0;
}

/* 正解 */
#btnCorrect {
  bottom: -100px;
  left: 22%;
  transform: translateX(-50%);
  
  width: 150px;
  padding: 20px 0;
  text-align: center;
  position: absolute;
}

/* 不正解 */
#btnWrong {
  bottom: -100px;
  left: 77%;
  transform: translateX(-50%); 
  
  width: 150px;
  padding: 20px 0;
  text-align: center;
  position: absolute;
}

/* 消す */
#btnClear {
  bottom: 110px;
  left: -230px;
  padding: 0 65px;
}

/* 一画戻す */
#btnUndo {
  bottom: 220px;
  left: -230px;
  padding: 0 37px;
}

/* 答え */
#btnAnswer {
  bottom: 140px;
  right: -230px;
  padding: 30px 20px;
}

/* 中断（左下ちょい内側） */
#btnExit {
  bottom: -90px;
  left: -200px;
}
</style>
</head>
<body>

<!-- =====================
     ユニット一覧画面
===================== -->

<div id="menu">

  <h2>漢検一級四字熟語書き取り</h2>
  <h3>ユニット選択</h3>

  <div id="unitList"></div>
<button onclick="openConfirm()">完全リセット</button>
</div>


<!-- =====================
     問題画面
===================== -->

<div id="game">

  <div id="title"></div>
  <div id="question"></div>
  <div id="choices"></div>

<div id="canvasArea">

  <canvas id="canvas"></canvas>

  <button id="btnAnswer" onclick="showAnswer()">答えを見る</button>

  <button id="btnCorrect" onclick="markCorrect()">正解</button>
  <button id="btnWrong" onclick="markWrong()">不正解</button>

  <button id="btnClear" onclick="clearCanvas()">消す</button>
  <button id="btnUndo" onclick="undoCanvas()">一画戻す</button>

  <button id="btnExit" onclick="backToMenu()">中断</button>

</div>

  <div id="answer"></div>

</div>

<div id="mistake" style="display:none;">
  <h2>間違えた問題</h2>
  <div id="mistakeList"></div>
</div>

<div id="tabBar">
  <button onclick="showTab('menu')" id="tabMenu">
    ユニット選択
  </button>

  <button onclick="showTab('mistake')" id="tabMistake">
    間違えた問題
  </button>
</div>

<script src="dataA.js?v=1.1"></script>

<script>

/*
====================================
状態管理
====================================
*/

let currentUnit = 0;
let index = 0;
let unit = [];
let shuffledChoices = [];
let currentScore = 0; // 今回の点数

/*
====================================
間違えた問題ユニット
====================================
*/

let mistakeUnits = [];

/*
形

[
  [10問],
  [10問],
  [3問]
]
*/

/*
scoreData の形

[
  {
    score: 80,
    played: true
  },
  ...
]
*/

let scoreData = units.map(() => ({
  score: null,
  played: false
}));

/*
====================================
localStorage 保存
====================================
*/

function saveData() {
  localStorage.setItem(
    "scoreData",
    JSON.stringify(scoreData)
  );

  localStorage.setItem(
    "mistakeUnits",
    JSON.stringify(mistakeUnits)
  );
}

/*
====================================
localStorage 読み込み
====================================
*/

function loadData() {
  const savedScore =
    localStorage.getItem("scoreData");

  const savedUnits =
    localStorage.getItem("mistakeUnits");

  if (savedScore) {
    scoreData = JSON.parse(savedScore);
  }

  if (savedUnits) {
    mistakeUnits = JSON.parse(savedUnits);
  }
}

/*
====================================
ユニット一覧作成
====================================
*/

function createUnitButtons() {
  const list = document.getElementById("unitList");
  list.innerHTML = "";

  for (let i = 0; i < units.length; i++) {
    const btn = document.createElement("button");

    const data = scoreData[i];

    let scoreText = "--点";
    let playedText = "□";

    if (data.played) {
      scoreText = data.score + "点";
      playedText = "✅";
    }

let scoreColor = "#999";

if (data.played) {
  if (data.score === 100) scoreColor = "green";
  else if (data.score >= 50) scoreColor = "orange";
  else scoreColor = "red";
}

btn.innerHTML = `
  <span>四字熟語問題${i + 1}</span>
  <span style="color:${scoreColor}">
    ${scoreText}
  </span>
  <span>${playedText}</span>
`;

    btn.className = "unitButton";

    btn.onclick = function () {
  startUnit(i);
};

    list.appendChild(btn);
  }
}


/*
====================================
ユニット開始
====================================
*/

function startUnit(unitNumber) {
  currentUnit = unitNumber;

  // 問題シャッフル
  unit = [...units[currentUnit]].sort(() => Math.random() - 0.5);

  // 👇 choicesを1回だけ作る
  shuffledChoices = unit.map(x =>
    x.hide === "front"
      ? x.frontYomi
      : x.backYomi
  );

  // 👇 1回だけシャッフル
  shuffledChoices.sort(() => Math.random() - 0.5);

  index = 0;
  currentScore = 0;

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("tabBar").style.display = "none";

  clearCanvas();
  showQuestion();
}

function startMistakeUnit(unitNumber) {
  unit = mistakeUnits[unitNumber];

  currentUnit =
    "復習 " + (unitNumber + 1);

shuffledChoices = unit.map(x =>
    x.hide === "front"
      ? x.frontYomi
      : x.backYomi

  );

  shuffledChoices.sort(() => Math.random() - 0.5);
  index = 0;
  currentScore = 0;

  document.getElementById("menu")
    .style.display = "none";

  document.getElementById("mistake")
    .style.display = "none";

  document.getElementById("game")
    .style.display = "block";

  document.getElementById("tabBar")
    .style.display = "none";

  clearCanvas();
  showQuestion();
}

/*
====================================
問題表示
====================================
*/

function showQuestion() {
  const w = unit[index];

  let displayText = "";

  if (w.hide === "front") {
    displayText = "□□" + w.kanji.slice(2, 4);
  }

  if (w.hide === "back") {
    displayText = w.kanji.slice(0, 2) + "□□";
  }

  document.getElementById("title").innerText =
    typeof currentUnit === "number"
      ? "四字熟語問題" + (currentUnit + 1)
      : currentUnit;

  document.getElementById("question").innerHTML = displayText;

  // 👉 シャッフル済みをそのまま使う
  document.getElementById("choices").innerText =
    shuffledChoices.join("　");

  document.getElementById("answer").innerText = "";
}
/*
====================================
答え表示
====================================
*/

function showAnswer() {
  const w = unit[index];

  document.getElementById("question").innerHTML =
    `<ruby>
      ${w.kanji}
      <rt>${w.frontYomi}　${w.backYomi}</rt>
    </ruby>`;
}

/*
====================================
正解
====================================
*/

function markCorrect() {
  currentScore += 10;
  nextQuestion();
}


/*
====================================
不正解
====================================
*/

function markWrong() {
  const w = unit[index];

  /*
  すでに全復習ユニットに
  入ってるか確認
  */
  let exists = false;

  for (const mu of mistakeUnits) {
    const found = mu.some(
      x => x.kanji === w.kanji
    );

    if (found) {
      exists = true;
      break;
    }
  }

  /*
  未登録なら追加
  */
  if (!exists) {

    /*
    最新ユニットがない
    または10問ある
    ↓
    新ユニット作成
    */
    if (
      mistakeUnits.length === 0 ||
      mistakeUnits[
        mistakeUnits.length - 1
      ].length >= 10
    ) {
      mistakeUnits.push([]);
    }

    /*
    最新ユニットへ追加
    */
    mistakeUnits[
      mistakeUnits.length - 1
    ].push(w);
  }

  saveData();

  nextQuestion();
}

function openConfirm() {
  document.getElementById("confirmBox").style.display = "flex";
}

function closeConfirm() {
  document.getElementById("confirmBox").style.display = "none";
}

function confirmReset() {
  closeConfirm();

  // ここにリセット処理
  localStorage.clear();

  scoreData = units.map(function () {
    return {
      score: null,
      played: false
    };
  });

  mistakeUnits = [];
  currentUnit = 0;
  index = 0;
  unit = [];
  currentScore = 0;

  document.getElementById("tabBar").style.display = "flex";
  document.getElementById("game").style.display = "none";
  document.getElementById("mistake").style.display = "none";
  document.getElementById("menu").style.display = "block";

  createUnitButtons();
}

/*
====================================
次へ
====================================
*/

function nextQuestion() {
  clearCanvas();

  index++;

  if (index >= unit.length) {

  // 👇追加（復習ユニットの場合）
  if (typeof currentUnit !== "number") {
    showReviewResult();
    return;
  }

  // 👇通常ユニット
  scoreData[currentUnit] = {
    score: currentScore,
    played: true
  };

  saveData();
  createUnitButtons();

  alert(`ユニット終了！\n${currentScore}点`);

  backToMenu();
  return;
}

  showQuestion();
}

/*
====================================
間違えた問題一覧更新
====================================
*/

/*
====================================
復習ユニット一覧作成
====================================
*/

function updateMistakeList() {
  const list =
    document.getElementById("mistakeList");

  if (mistakeUnits.length === 0) {
    list.innerHTML =
      "まだありません";
    return;
  }

  list.innerHTML = "";

  for (let i = 0; i < mistakeUnits.length; i++) {
    const btn =
      document.createElement("button");

    btn.className = "unitButton";
    btn.style.background = "#ffeaea";

    btn.innerText =
      `間違えた問題 ${i + 1}（${mistakeUnits[i].length}問）`;

    btn.onclick = function () {
      startMistakeUnit(i);
    };

    list.appendChild(btn);
  }
}

function showReviewResult() {

  document.getElementById("game").style.display = "none";
  document.getElementById("reviewResult").style.display = "block";

  const list = document.getElementById("reviewList");

  const unitIndex =
    parseInt(currentUnit.replace("復習 ", "")) - 1;

  const currentList = mistakeUnits[unitIndex];

  list.innerHTML = currentList.map((w, i) => `
    <div>
      <input type="checkbox" checked id="chk${i}">
      ${w.kanji}（${w.frontYomi} ${w.backYomi}）
    </div>
  `).join("");
}


function applyReview() {

  const unitIndex =
    parseInt(currentUnit.replace("復習 ", "")) - 1;

  const currentList = mistakeUnits[unitIndex];

  const newList = currentList.filter((w, i) => {
    return document.getElementById("chk" + i).checked;
  });

  mistakeUnits[unitIndex] = newList;

  saveData();

  alert("更新しました");

// 復習画面消す
document.getElementById("reviewResult").style.display = "none";

// メニュー戻る
backToMenu();
}

/*
====================================
タブ切り替え
====================================
*/

function showTab(tabName) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "none";
  document.getElementById("mistake").style.display = "none";

  document.getElementById("tabBar").style.display = "flex";
  document.getElementById(tabName).style.display = "block";

  document.getElementById("tabMenu")
    .classList.remove("activeTab");

  document.getElementById("tabMistake")
    .classList.remove("activeTab");

  if (tabName === "menu") {
    document.getElementById("tabMenu")
      .classList.add("activeTab");

    createUnitButtons();
  }

  if (tabName === "mistake") {
    document.getElementById("tabMistake")
      .classList.add("activeTab");

    updateMistakeList();
  }
}


/*
====================================
戻る
====================================
*/

function backToMenu() {

  // 復習画面なら保存
  if (document.getElementById("reviewResult").style.display === "block") {

    const unitIndex =
      parseInt(currentUnit.replace("復習 ", "")) - 1;

    const currentList = mistakeUnits[unitIndex];

    const newList = currentList.filter((w, i) => {
      const chk = document.getElementById("chk" + i);
      return chk && chk.checked;
    });

    mistakeUnits[unitIndex] = newList;

    // 👇 ここが追加
    mistakeUnits = mistakeUnits.filter(u => u.length > 0);

    saveData();
  }

  document.getElementById("reviewResult").style.display = "none";

  document.getElementById("tabBar").style.display = "flex";
  showTab("menu");
}

let canvas;
let ctx;
let drawing = false;
let lastX = 0;
let lastY = 0;
let history = [];

/*
====================================
現在の canvas を保存
====================================
*/

function saveCanvasState() {
  history.push(
    canvas.toDataURL()
  );
}

function clearCanvas() {
  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );
}

function undoCanvas() {
  if (history.length === 0) {
    clearCanvas();
    return;
  }

  const img = new Image();

  img.onload = function () {
    clearCanvas();
    ctx.drawImage(
      img,
      0,
      0
    );
  };

  img.src = history.pop();
}

function setupCanvas() {
  canvas = document.getElementById("canvas");
  ctx = canvas.getContext("2d");

  ctx.lineWidth = 3;
  ctx.lineCap = "round";

  canvas.addEventListener(
    "touchstart",
    function (e) {
      e.preventDefault();
      saveCanvasState();
      drawing = true;

      const rect =
        canvas.getBoundingClientRect();

      const touch = e.touches[0];

      lastX =
        touch.clientX - rect.left;

      lastY =
        touch.clientY - rect.top;
    }
  );

  canvas.addEventListener(
    "touchmove",
    function (e) {
      if (!drawing) return;

      const rect =
        canvas.getBoundingClientRect();

      const touch = e.touches[0];

      const x =
        touch.clientX - rect.left;

      const y =
        touch.clientY - rect.top;

      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();

      lastX = x;
      lastY = y;
    }
  );

  canvas.addEventListener(
    "touchend",
    function () {
      drawing = false;
    }
  );
}

/*
====================================
最初に実行
====================================
*/

window.onload = function () {
  loadData();
  createUnitButtons();
  setupCanvas();
  showTab("menu");
  
  document.getElementById("version").innerText =
  "ver " + APP_VERSION;
};

</script>
<div id="confirmBox" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
  ">
    <p>本当にリセットする？</p>
    <button onclick="confirmReset()">はい</button>
    <button onclick="closeConfirm()">キャンセル</button>
  </div>

</div>
<div id="reviewResult" style="display:none">

  <h2>復習チェック</h2>

  <div id="reviewList"></div>
  <button onclick="backToMenu()">戻る</button>

</div>
</body>
</html>
